# One-shot / repeatable: ensure DNS CNAMEs for example subdomains
# point at their Cloudflare Pages projects.
#
# Pages "custom domain" attach alone is not enough if the API token
# lacked Zone.DNS write — records stay NXDOMAIN.
#
# Required secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
# Token needs: Zone → DNS → Edit (for blinnmotion.com) + Pages Edit

name: Fix example DNS

on:
  workflow_dispatch:

jobs:
  dns:
    name: Ensure CNAME records
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Create / update DNS + re-attach Pages domains
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "::error::Missing Cloudflare secrets"
            exit 1
          fi

          AUTH=(-H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" -H "Content-Type: application/json")

          # Resolve zone id for blinnmotion.com
          ZONE_JSON=$(curl -sS "${AUTH[@]}" \
            "https://api.cloudflare.com/client/v4/zones?name=blinnmotion.com")
          ZONE_ID=$(echo "$ZONE_JSON" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          if not d.get('success') or not d.get('result'):
              print('ZONE_LOOKUP_FAILED', d, file=sys.stderr)
              sys.exit(1)
          print(d['result'][0]['id'])
          ")
          echo "Zone blinnmotion.com → $ZONE_ID"

          # id project domain
          python3 - <<'PY' > /tmp/examples.json
          import json
          print(json.dumps([
            {"id":"vanilla","project":"blinn-motion-ex-vanilla","domain":"vanilla.blinnmotion.com"},
            {"id":"react","project":"blinn-motion-ex-react","domain":"react.blinnmotion.com"},
            {"id":"vue","project":"blinn-motion-ex-vue","domain":"vue.blinnmotion.com"},
            {"id":"svelte","project":"blinn-motion-ex-svelte","domain":"svelte.blinnmotion.com"},
            {"id":"angular","project":"blinn-motion-ex-angular","domain":"angular.blinnmotion.com"},
            {"id":"lit","project":"blinn-motion-ex-lit","domain":"lit.blinnmotion.com"},
            {"id":"next","project":"blinn-motion-ex-next","domain":"next.blinnmotion.com"},
            {"id":"astro","project":"blinn-motion-ex-astro","domain":"astro.blinnmotion.com"},
          ]))
          PY

          fail=0
          while read -r line; do
            id=$(echo "$line" | python3 -c "import json,sys; print(json.load(sys.stdin)['id'])")
            project=$(echo "$line" | python3 -c "import json,sys; print(json.load(sys.stdin)['project'])")
            domain=$(echo "$line" | python3 -c "import json,sys; print(json.load(sys.stdin)['domain'])")
            target="${project}.pages.dev"
            echo ""
            echo "=== $domain → $target ==="

            # 1) Re-attach custom domain on Pages project (idempotent)
            ATTACH=$(curl -sS -X POST "${AUTH[@]}" \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${project}/domains" \
              --data "{\"name\":\"${domain}\"}")
            echo "$ATTACH" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          if d.get('success'):
              print('Pages domain OK:', d.get('result',{}).get('name'), d.get('result',{}).get('status'))
          else:
              print('Pages domain response:', d)
          "

            # 2) Ensure DNS CNAME (proxied)
            LIST=$(curl -sS "${AUTH[@]}" \
              "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records?name=${domain}&type=CNAME")
            REC_ID=$(echo "$LIST" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          res=d.get('result') or []
          print(res[0]['id'] if res else '')
          ")

            BODY=$(python3 -c "
          import json
          print(json.dumps({
            'type': 'CNAME',
            'name': '${domain}',
            'content': '${target}',
            'proxied': True,
            'ttl': 1,
            'comment': 'Blinn Motion example lab (Pages)',
          }))
          ")

            if [ -n "$REC_ID" ]; then
              echo "Updating existing CNAME $REC_ID"
              RESP=$(curl -sS -X PUT "${AUTH[@]}" \
                "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records/${REC_ID}" \
                --data "$BODY")
            else
              echo "Creating CNAME"
              RESP=$(curl -sS -X POST "${AUTH[@]}" \
                "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records" \
                --data "$BODY")
            fi

            echo "$RESP" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          if d.get('success'):
              r=d['result']
              print(f\"DNS OK: {r.get('name')} CNAME → {r.get('content')} proxied={r.get('proxied')}\")
          else:
              print('DNS FAIL:', d)
              sys.exit(2)
          " || fail=1

          done < <(python3 -c "import json; [print(json.dumps(x)) for x in json.load(open('/tmp/examples.json'))]")

          echo ""
          echo "==== Summary probe (CF DNS) ===="
          for domain in react.blinnmotion.com vanilla.blinnmotion.com vue.blinnmotion.com; do
            curl -sS "https://cloudflare-dns.com/dns-query?name=${domain}&type=A" \
              -H "accept: application/dns-json" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          ans=d.get('Answer') or []
          print('${domain}:', 'Status', d.get('Status'), [(a.get('type'), a.get('data')) for a in ans[:4]])
          "
          done

          exit $fail
