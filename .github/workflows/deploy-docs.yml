# Export Mintlify docs to a static bundle and deploy to Cloudflare Pages.
# Production: https://docs.blinnmotion.com
#
# Same secrets as the landing deploy:
#   CLOUDFLARE_API_TOKEN
#   CLOUDFLARE_ACCOUNT_ID
#
# After first deploy, attach custom domain docs.blinnmotion.com on the
# Pages project `blinn-motion-docs`.

name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/deploy-docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: docs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check docs.json + nav pages
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");
          const cfg = JSON.parse(fs.readFileSync("docs.json", "utf8"));
          console.log("docs.json OK");
          const pages = [];
          for (const tab of cfg.navigation?.tabs || []) {
            for (const group of tab.groups || []) {
              for (const p of group.pages || []) pages.push(p);
            }
          }
          let missing = 0;
          for (const p of pages) {
            const file = path.join(process.cwd(), `${p}.mdx`);
            if (!fs.existsSync(file)) {
              console.error("Missing page:", file);
              missing++;
            }
          }
          if (missing) process.exit(1);
          console.log(`OK — ${pages.length} nav pages present`);
          NODE

  deploy:
    name: Export & deploy to Cloudflare Pages
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: docs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Verify Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          missing=0
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Secret CLOUDFLARE_API_TOKEN is empty or not set."
            missing=1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Secret CLOUDFLARE_ACCOUNT_ID is empty or not set."
            missing=1
          fi
          exit $missing

      - name: Install dependencies
        run: npm ci

      - name: Static export (mint export → export.zip)
        run: npx mint export --output export.zip

      - name: Unpack export into dist/
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir dist
          unzip -q export.zip -d dist
          # Drop offline-only helpers / nested archive — not needed on Pages.
          rm -f dist/export.zip dist/serve.js \
            "dist/Start Docs.bat" "dist/Start Docs.command"
          test -f dist/index.html
          echo "dist/ contents:"
          ls -la dist | head -30

      - name: Inject robots.txt + sitemap.xml + llms.txt
        run: node ./scripts/inject-seo.mjs

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT_NAME: blinn-motion-docs
        run: |
          set -euo pipefail
          if ! npx --yes wrangler@4 pages project list 2>/dev/null | grep -qE "(^|\\s)${PROJECT_NAME}(\\s|$)"; then
            echo "Creating Pages project: ${PROJECT_NAME}"
            npx --yes wrangler@4 pages project create "${PROJECT_NAME}" \
              --production-branch=main
          else
            echo "Pages project ${PROJECT_NAME} already exists"
          fi

          npx --yes wrangler@4 pages deploy dist \
            --project-name="${PROJECT_NAME}" \
            --branch=main \
            --commit-dirty=true
