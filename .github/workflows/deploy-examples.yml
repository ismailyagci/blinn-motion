# Build each web example against published @blinn-motion/* (npm registry)
# and deploy to Cloudflare Pages with custom subdomains on blinnmotion.com.
#
# Local monorepo still uses workspace packages / source aliases when packages/
# exist. CI stages a tree WITHOUT packages/ so installs resolve from npm.
#
# Required secrets (same as landing/docs):
#   CLOUDFLARE_API_TOKEN
#   CLOUDFLARE_ACCOUNT_ID
#
# Live URLs (after DNS/custom domain settles):
#   https://vanilla.blinnmotion.com
#   https://react.blinnmotion.com
#   https://vue.blinnmotion.com
#   https://svelte.blinnmotion.com
#   https://angular.blinnmotion.com
#   https://lit.blinnmotion.com
#   https://next.blinnmotion.com
#   https://astro.blinnmotion.com
#
# Skipped (not static web for Pages): expo, react-native

name: Deploy examples

on:
  push:
    branches: [main]
    paths:
      - "examples/**"
      - "fixtures/**"
      - ".github/workflows/deploy-examples.yml"
  workflow_dispatch:
    inputs:
      only:
        description: "Deploy only this example id (empty = all)"
        required: false
        default: ""

concurrency:
  group: deploy-examples-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: ${{ matrix.id }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: vanilla
            project: blinn-motion-ex-vanilla
            domain: vanilla.blinnmotion.com
            out: dist
          - id: react
            project: blinn-motion-ex-react
            domain: react.blinnmotion.com
            out: dist
          - id: vue
            project: blinn-motion-ex-vue
            domain: vue.blinnmotion.com
            out: dist
          - id: svelte
            project: blinn-motion-ex-svelte
            domain: svelte.blinnmotion.com
            out: dist
          - id: angular
            project: blinn-motion-ex-angular
            domain: angular.blinnmotion.com
            out: dist
          - id: lit
            project: blinn-motion-ex-lit
            domain: lit.blinnmotion.com
            out: dist
          - id: next
            project: blinn-motion-ex-next
            domain: next.blinnmotion.com
            out: out
          - id: astro
            project: blinn-motion-ex-astro
            domain: astro.blinnmotion.com
            out: dist

    steps:
      - name: Optionally skip (only filter)
        id: gate
        run: |
          only="${{ github.event.inputs.only }}"
          if [ -n "$only" ] && [ "$only" != "${{ matrix.id }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping ${{ matrix.id }} (only=$only)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify Cloudflare secrets
        if: steps.gate.outputs.skip != 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          missing=0
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Secret CLOUDFLARE_API_TOKEN is empty or not set."
            missing=1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Secret CLOUDFLARE_ACCOUNT_ID is empty or not set."
            missing=1
          fi
          exit $missing

      - name: Stage standalone tree (no monorepo packages/)
        if: steps.gate.outputs.skip != 'true'
        env:
          EXAMPLE: ${{ matrix.id }}
        run: |
          set -euo pipefail
          STAGE="${RUNNER_TEMP}/blinn-ex-${EXAMPLE}"
          rm -rf "$STAGE"
          mkdir -p "$STAGE/examples"
          # fixtures + shared chrome (relative imports from example sources)
          cp -R fixtures "$STAGE/"
          cp -R examples/_shared "$STAGE/examples/"
          # example app only — exclude local installs/builds
          rsync -a \
            --exclude node_modules \
            --exclude dist \
            --exclude out \
            --exclude .next \
            "examples/${EXAMPLE}/" "$STAGE/examples/${EXAMPLE}/"
          # Critical: no packages/ → localBlinnAlias returns {} → npm registry
          test ! -d "$STAGE/packages"
          echo "STAGE=$STAGE" >> "$GITHUB_ENV"
          echo "Staged $STAGE/examples/${EXAMPLE}"
          ls -la "$STAGE/examples/${EXAMPLE}"

      # Examples pin published @blinn-motion/* versions. On a release push, Publish
      # and Deploy examples race: npm may not have the new version yet (ETARGET).
      - name: Install from npm registry
        if: steps.gate.outputs.skip != 'true'
        working-directory: ${{ env.STAGE }}/examples/${{ matrix.id }}
        run: |
          set -euo pipefail
          # Resolve required @blinn-motion/* ranges from package.json and wait until
          # the registry serves a matching version (publish race after version bumps).
          python3 - <<'PY'
          import json, re, subprocess, sys, time, urllib.request

          pkg = json.load(open("package.json"))
          deps = {**pkg.get("dependencies", {}), **pkg.get("devDependencies", {})}
          needed = {k: v for k, v in deps.items() if k.startswith("@blinn-motion/")}
          if not needed:
              print("No @blinn-motion/* deps — skip registry wait")
              sys.exit(0)

          def latest(name):
              url = f"https://registry.npmjs.org/{name}/latest"
              try:
                  with urllib.request.urlopen(url, timeout=15) as r:
                      return json.load(r).get("version")
              except Exception as e:
                  print(f"  registry lookup failed for {name}: {e}")
                  return None

          def satisfies(version: str, spec: str) -> bool:
              # Handle ^x.y.z / ~x.y.z / exact x.y.z used by these examples.
              m = re.match(r"^([\^~]?)(\d+)\.(\d+)\.(\d+)$", spec.strip())
              if not m:
                  # Fallback: let npm decide later
                  return True
              op, maj, min_, pat = m.group(1), int(m.group(2)), int(m.group(3)), int(m.group(4))
              vm = re.match(r"^(\d+)\.(\d+)\.(\d+)", version or "")
              if not vm:
                  return False
              vmaj, vmin, vpat = int(vm.group(1)), int(vm.group(2)), int(vm.group(3))
              if op == "^":
                  if maj == 0:
                      return (vmaj, vmin) == (0, min_) and vpat >= pat
                  return vmaj == maj and (vmin, vpat) >= (min_, pat)
              if op == "~":
                  return (vmaj, vmin) == (maj, min_) and vpat >= pat
              return (vmaj, vmin, vpat) == (maj, min_, pat)

          print("Waiting for npm registry versions:")
          for name, spec in sorted(needed.items()):
              print(f"  {name}@{spec}")

          deadline = time.time() + 8 * 60  # 8 minutes max
          attempt = 0
          while time.time() < deadline:
              attempt += 1
              missing = []
              for name, spec in needed.items():
                  ver = latest(name)
                  ok = ver is not None and satisfies(ver, spec)
                  print(f"  [{attempt}] {name}: latest={ver} need={spec} ok={ok}")
                  if not ok:
                      missing.append(name)
              if not missing:
                  print("All required @blinn-motion/* versions available on npm")
                  sys.exit(0)
              sleep = min(15 + attempt * 5, 45)
              print(f"Missing {missing} — retry in {sleep}s (publish race?)")
              time.sleep(sleep)

          print("::error::Timed out waiting for @blinn-motion/* on npm registry")
          sys.exit(1)
          PY

          # Retry npm install as a second safety net (registry eventual consistency).
          for i in 1 2 3 4 5 6; do
            if npm install; then
              exit 0
            fi
            echo "npm install failed (attempt $i/6) — retrying in 20s..."
            sleep 20
          done
          echo "::error::npm install failed after retries"
          exit 1

      - name: Build
        if: steps.gate.outputs.skip != 'true'
        working-directory: ${{ env.STAGE }}/examples/${{ matrix.id }}
        run: npm run build

      - name: Verify output
        if: steps.gate.outputs.skip != 'true'
        working-directory: ${{ env.STAGE }}/examples/${{ matrix.id }}
        run: |
          set -euo pipefail
          OUT="${{ matrix.out }}"
          ls -la "$OUT"
          test -f "$OUT/index.html"
          # Sanity: bundle should not reference monorepo absolute paths
          if grep -R "packages/core/src" "$OUT" 2>/dev/null; then
            echo "::error::Build appears to bundle monorepo source paths"
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.gate.outputs.skip != 'true'
        working-directory: ${{ env.STAGE }}/examples/${{ matrix.id }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT_NAME: ${{ matrix.project }}
          DOMAIN: ${{ matrix.domain }}
          OUT: ${{ matrix.out }}
        run: |
          set -euo pipefail
          if ! npx --yes wrangler@4 pages project list 2>/dev/null | grep -qE "(^|\\s)${PROJECT_NAME}(\\s|$)"; then
            echo "Creating Pages project: ${PROJECT_NAME}"
            npx --yes wrangler@4 pages project create "${PROJECT_NAME}" \
              --production-branch=main
          else
            echo "Pages project ${PROJECT_NAME} already exists"
          fi

          npx --yes wrangler@4 pages deploy "${OUT}" \
            --project-name="${PROJECT_NAME}" \
            --branch=main \
            --commit-dirty=true

          AUTH_H=(-H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" -H "Content-Type: application/json")

          # 1) Attach custom subdomain on the Pages project (idempotent).
          echo "Ensuring Pages custom domain: ${DOMAIN}"
          RESP=$(curl -sS -X POST "${AUTH_H[@]}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${PROJECT_NAME}/domains" \
            --data "{\"name\":\"${DOMAIN}\"}")
          echo "$RESP" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          if d.get('success'):
              print('Pages domain attached:', d.get('result',{}).get('name') or d)
          else:
              errs=d.get('errors') or []
              msgs=' '.join(str(e) for e in errs)
              if any(e.get('code') in (8000014, 8000032) or 'already' in str(e).lower() for e in errs):
                  print('Pages domain already configured:', msgs)
              else:
                  print('::warning::Pages domain attach response:', d)
          "

          # 2) Ensure DNS CNAME exists in the blinnmotion.com zone.
          # Pages attach alone does not always create DNS if the token lacks Zone.DNS.
          TARGET="${PROJECT_NAME}.pages.dev"
          ZONE_JSON=$(curl -sS "${AUTH_H[@]}" \
            "https://api.cloudflare.com/client/v4/zones?name=blinnmotion.com")
          ZONE_ID=$(echo "$ZONE_JSON" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          res=d.get('result') or []
          if not d.get('success') or not res:
              print('', end='')
          else:
              print(res[0]['id'])
          ")
          if [ -z "$ZONE_ID" ]; then
            echo "::warning::Could not resolve zone blinnmotion.com — create CNAME ${DOMAIN} → ${TARGET} manually."
            echo "Zone lookup: $ZONE_JSON"
          else
            echo "Zone $ZONE_ID — ensuring CNAME ${DOMAIN} → ${TARGET}"
            LIST=$(curl -sS "${AUTH_H[@]}" \
              "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records?name=${DOMAIN}&type=CNAME")
            REC_ID=$(echo "$LIST" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          res=d.get('result') or []
          print(res[0]['id'] if res else '')
          ")
            BODY=$(python3 -c "
          import json
          print(json.dumps({
            'type': 'CNAME',
            'name': '${DOMAIN}',
            'content': '${TARGET}',
            'proxied': True,
            'ttl': 1,
            'comment': 'Blinn Motion example lab (Pages)',
          }))
          ")
            if [ -n "$REC_ID" ]; then
              DNS_RESP=$(curl -sS -X PUT "${AUTH_H[@]}" \
                "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records/${REC_ID}" \
                --data "$BODY")
            else
              DNS_RESP=$(curl -sS -X POST "${AUTH_H[@]}" \
                "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records" \
                --data "$BODY")
            fi
            echo "$DNS_RESP" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          if d.get('success'):
              r=d['result']
              print(f\"DNS OK: {r.get('name')} CNAME → {r.get('content')} proxied={r.get('proxied')}\")
          else:
              print('::warning::DNS CNAME failed (token may need Zone.DNS Edit):', d)
          "
          fi

          echo "pages_dev=https://${PROJECT_NAME}.pages.dev" >> "$GITHUB_STEP_SUMMARY"
          echo "custom=https://${DOMAIN}" >> "$GITHUB_STEP_SUMMARY"

      # Prove the public custom domain serves the lab (not Access Denied / empty).
      # Fresh SSL / DNS can lag a few minutes after first attach — retry with backoff.
      - name: Smoke test production URL
        if: steps.gate.outputs.skip != 'true'
        env:
          DOMAIN: ${{ matrix.domain }}
          PROJECT_NAME: ${{ matrix.project }}
        run: |
          set -euo pipefail
          URL="https://${DOMAIN}/"
          PAGES_URL="https://${PROJECT_NAME}.pages.dev/"
          ok=0
          for i in 1 2 3 4 5 6 7 8; do
            code=$(curl -sS -o /tmp/ex-smoke.html -w "%{http_code}" --max-time 20 \
              -A "BlinnMotion-CI-Smoke/1.0" "$URL" || echo "000")
            body=$(head -c 4000 /tmp/ex-smoke.html 2>/dev/null || true)
            denied=0
            echo "$body" | grep -qiE 'access.?denied|cloudflare access|login\.cloudflareaccess|Error 1[0-9]{3}|Attention Required' && denied=1 || true
            title=$(echo "$body" | sed -n 's/.*<title>\([^<]*\)<\/title>.*/\1/ip' | head -1)
            echo "attempt $i: $URL → HTTP $code title=${title:-?} denied=$denied"
            if [ "$code" = "200" ] && [ "$denied" = "0" ] && echo "$body" | grep -qiE 'blinn|motion|doctype html'; then
              ok=1
              break
            fi
            sleep $((10 + i * 5))
          done
          if [ "$ok" != "1" ]; then
            echo "::error::Smoke test failed for $URL"
            echo "Body preview:"
            head -c 800 /tmp/ex-smoke.html || true
            exit 1
          fi
          # pages.dev is optional (Access / network may block) — report only
          pcode=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 \
            -A "BlinnMotion-CI-Smoke/1.0" "$PAGES_URL" || echo "000")
          echo "pages.dev check: $PAGES_URL → HTTP $pcode (informational)"
          echo "smoke_ok=$URL" >> "$GITHUB_STEP_SUMMARY"
