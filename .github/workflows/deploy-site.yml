# Deploy the Astro marketing landing page to Cloudflare Pages.
# Production: https://blinnmotion.com
#
# Required GitHub secrets (repo Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — Account → Cloudflare Pages → Edit (+ Account Read)
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare dashboard → right sidebar
#
# First deploy creates the Pages project if missing (project name below).
# Then attach custom domains in Cloudflare Pages → Custom domains:
#   blinnmotion.com , www.blinnmotion.com

name: Deploy landing

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

concurrency:
  group: deploy-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Astro 7 requires Node >= 22.12.0
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Verify Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          missing=0
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Secret CLOUDFLARE_API_TOKEN is empty or not set."
            echo "Create a token at https://dash.cloudflare.com/profile/api-tokens"
            echo "Permissions: Account → Cloudflare Pages → Edit, Account → Account Settings → Read"
            missing=1
          else
            echo "CLOUDFLARE_API_TOKEN is set (length ${#CLOUDFLARE_API_TOKEN})"
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Secret CLOUDFLARE_ACCOUNT_ID is empty or not set."
            echo "Find it in Cloudflare dashboard → Workers & Pages (right sidebar) or any domain overview."
            missing=1
          else
            echo "CLOUDFLARE_ACCOUNT_ID is set (length ${#CLOUDFLARE_ACCOUNT_ID})"
          fi
          exit $missing

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build Astro site
        working-directory: site
        run: npm run build

      - name: List build output
        working-directory: site
        run: ls -la dist && test -f dist/index.html

      - name: Deploy to Cloudflare Pages
        working-directory: site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT_NAME: blinn-motion
        # Wrangler 4 no longer auto-creates Pages projects on deploy.
        # Create once if missing, then direct-upload dist/.
        run: |
          set -euo pipefail
          # Ensure the Pages project exists (idempotent).
          if ! npx --yes wrangler@4 pages project list 2>/dev/null | grep -qE "(^|\\s)${PROJECT_NAME}(\\s|$)"; then
            echo "Creating Pages project: ${PROJECT_NAME}"
            npx --yes wrangler@4 pages project create "${PROJECT_NAME}" \
              --production-branch=main
          else
            echo "Pages project ${PROJECT_NAME} already exists"
          fi

          npx --yes wrangler@4 pages deploy dist \
            --project-name="${PROJECT_NAME}" \
            --branch=main \
            --commit-dirty=true
