# Deploy the Astro marketing landing page to Cloudflare Pages.
# Production: https://blinnmotion.com
#
# Required GitHub secrets (repo Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — Pages:Edit + Account:Read
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare dashboard → right sidebar
#
# First deploy creates the Pages project if missing (project name below).
# Then attach custom domains in Cloudflare Pages → Custom domains:
#   blinnmotion.com , www.blinnmotion.com

name: Deploy landing

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

concurrency:
  group: deploy-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Astro 7 requires Node >= 22.12.0
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build Astro site
        working-directory: site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # project-name is the Cloudflare Pages project id (not the domain)
          command: pages deploy dist --project-name=blinn-motion --branch=main --commit-dirty=true
          workingDirectory: site
          packageManager: npm
