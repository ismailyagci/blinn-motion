<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  :root {
    --bg: var(--figma-color-bg, #1e1e1e);
    --bg2: var(--figma-color-bg-secondary, #2a2a2a);
    --txt: var(--figma-color-text, #e6e6e6);
    --mut: var(--figma-color-text-secondary, #9a9a9a);
    --line: var(--figma-color-border, #3a3a3a);
    --acc: var(--figma-color-bg-brand, #5b8cff);
    --accTxt: var(--figma-color-text-onbrand, #fff);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { font: 11px/1.4 Inter, ui-sans-serif, system-ui, sans-serif; color: var(--txt); background: var(--bg);
         display: flex; flex-direction: row; height: 100vh; overflow: hidden; }

  /* preview column */
  .preview { flex: 1 1 auto; min-width: 0; min-height: 0; overflow: hidden;
             display: flex; flex-direction: column; border-right: 1px solid var(--line); }
  .pvHead { padding: 9px 14px; border-bottom: 1px solid var(--line); display: flex; align-items: baseline; gap: 8px; flex: none; }
  .pvHead b { font-size: 12px; } .pvHead .dur { color: var(--mut); }
  .warn { margin-left: auto; color: #e0a23c; font-size: 10px; max-width: 50%; text-align: right; }

  .stageArea { flex: 1 1 auto; min-height: 0; display: flex; align-items: center; justify-content: center; overflow: hidden;
               position: relative;
               background:
                 repeating-conic-gradient(#ffffff0a 0 90deg, #00000018 0 180deg) 0 0/22px 22px, var(--bg2); }
  .hostBox { position: relative; overflow: hidden; outline: 1px solid #ffffff24; flex: none; }
  #host { transform-origin: top left; }
  .empty { color: var(--mut); text-align: center; max-width: 260px; padding: 20px; }

  .ctrls { flex: none; padding: 8px 12px; border-top: 1px solid var(--line); display: flex; align-items: center; gap: 8px;
           background: var(--bg); }
  .play { width: 34px; height: 28px; font-size: 12px; display: inline-flex; align-items: center; justify-content: center; }
  .ctrls input[type=range] { flex: 1; min-width: 60px; accent-color: var(--acc); }
  .tt { color: var(--mut); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .chk { color: var(--mut); display: inline-flex; gap: 4px; align-items: center; cursor: pointer; user-select: none; }
  .fit { color: var(--mut); white-space: nowrap; }
  select { font: inherit; background: var(--bg2); color: var(--txt); border: 1px solid var(--line); border-radius: 6px; padding: 4px 6px; }

  button { font: inherit; background: var(--bg2); color: var(--txt); border: 1px solid var(--line);
           border-radius: 6px; padding: 6px 10px; cursor: pointer; }
  button:hover { border-color: var(--acc); }
  button.primary { background: var(--acc); border-color: var(--acc); color: var(--accTxt); }
  button.icon { width: 30px; height: 28px; padding: 0; display: inline-flex; align-items: center; justify-content: center; }

  /* side column */
  .side { flex: 0 0 360px; min-width: 0; min-height: 0; overflow: hidden;
          display: flex; flex-direction: column; background: var(--bg); }
  .tabs { display: flex; gap: 4px; padding: 8px 10px 0; border-bottom: 1px solid var(--line); flex: none; }
  .tab { padding: 6px 10px; border: 1px solid transparent; border-bottom: none; border-radius: 6px 6px 0 0;
         color: var(--mut); cursor: pointer; }
  .tab.on { color: var(--txt); background: var(--bg2); border-color: var(--line); }
  pre { flex: 1 1 auto; min-height: 0; margin: 0; overflow: auto; padding: 10px 12px; white-space: pre; background: var(--bg);
        font: 10px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; color: #cdd6e6; }
  .sideBar { flex: none; padding: 8px 10px; border-top: 1px solid var(--line); display: flex; gap: 6px; align-items: center; }
  .sideBar .grow { flex: 1; }
  .stat { flex: none; padding: 4px 12px; color: var(--mut); border-top: 1px solid var(--line); font-size: 10px; }

  /* debug bar (onion-skin reference + outlines + exact time) */
  .dbg { flex: none; padding: 7px 12px; border-top: 1px solid var(--line); display: flex; align-items: center; gap: 10px;
         background: var(--bg2); flex-wrap: wrap; }
  .dbg label { color: var(--mut); display: inline-flex; gap: 5px; align-items: center; white-space: nowrap; }
  .dbg input[type=number] { width: 56px; background: var(--bg); color: var(--txt); border: 1px solid var(--line); border-radius: 5px; padding: 3px 5px; font: inherit; }
  .dbg input[type=range] { width: 78px; accent-color: var(--acc); }
  #refImg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: fill; pointer-events: none; display: none; z-index: 5; mix-blend-mode: normal; }
  #host.outline [data-id] { outline: 1px solid #ff00d4aa; outline-offset: -1px; }
  /* health report */
  .health { flex: 1 1 auto; min-height: 0; overflow: auto; padding: 10px 12px; font: 10px/1.5 ui-monospace, Menlo, monospace; }
  .health .hl { margin: 0 0 8px; padding: 7px 9px; border-radius: 6px; border: 1px solid var(--line); background: var(--bg2); }
  .health .hl.bad { border-color: #b4523c; } .health .hl.warnc { border-color: #b08a2c; } .health .hl.ok { border-color: #3a7a4a; }
  .health .hid { color: var(--mut); } .health .hname { color: var(--txt); font-weight: 600; }
  .health .iss { color: #e88; display: block; margin-top: 3px; } .health .iss.w { color: #e0b84c; }
</style>
</head>
<body>
  <div class="preview">
    <div class="pvHead">
      <b id="title">—</b><span class="dur" id="dur"></span>
      <span class="warn" id="warn"></span>
    </div>
    <div class="stageArea" id="stageArea">
      <div class="empty" id="empty">
        <div id="emptyMsg">Select an animated frame in Figma (one with a Motion timeline) to preview it here with our own engine.</div>
        <button id="demoEmpty" class="primary" style="margin-top:12px">🎬 Create a demo animation</button>
      </div>
      <div class="hostBox" id="hostBox" style="display:none"><div id="host"></div><img id="refImg" alt="reference" /></div>
    </div>
    <div class="ctrls">
      <button class="play" id="play" title="Play / Pause">▶</button>
      <button class="icon" id="restart" title="Restart">⟲</button>
      <input type="range" id="scrub" min="0" max="1000" value="0" />
      <span class="tt" id="time">0.00 / 0.00s</span>
      <label class="chk"><input type="checkbox" id="loop" checked /> loop</label>
      <select id="speed" title="Playback speed">
        <option value="0.25">0.25×</option>
        <option value="0.5">0.5×</option>
        <option value="1" selected>1×</option>
        <option value="2">2×</option>
      </select>
      <span class="fit">fit <span id="fit">100%</span></span>
      <button class="icon" id="dbgToggle" title="Debug / compare tools">🔍</button>
    </div>
    <div class="dbg" id="dbgBar" style="display:none">
      <label title="Outline every layer box + name in the preview"><input type="checkbox" id="dbgOutline" /> outlines</label>
      <label title="Seek to an exact time to match Figma's playhead">t <input id="dbgTime" type="number" step="0.05" min="0" value="0" /> s</label>
      <label title="Load a Figma screenshot at this time to overlay (onion-skin)">ref <input id="dbgRef" type="file" accept="image/*" /></label>
      <label>α <input id="dbgRefOp" type="range" min="0" max="100" value="50" /></label>
      <button class="icon" id="dbgRefClear" title="Clear reference">✕</button>
    </div>
  </div>

  <div class="side">
    <div class="tabs">
      <div class="tab on" data-tab="doc">MotionDoc (our engine)</div>
      <div class="tab" data-tab="raw">Figma raw</div>
      <div class="tab" data-tab="health">Health</div>
    </div>
    <pre id="json">{}</pre>
    <div class="health" id="health" style="display:none"></div>
    <div class="sideBar">
      <button id="copy">Copy</button>
      <button id="download" class="primary">Download .json</button>
      <span class="grow"></span>
      <button id="demo">🎬 Demo</button>
      <button id="reexport">↻ Re-read</button>
    </div>
    <div class="stat" id="stat">Layers: 0 · Tracks: 0</div>
  </div>

<script>/*__ENGINE__*/</script>
<script>
const $ = (id) => document.getElementById(id);
let current = { doc: null, raw: null };
let activeTab = 'doc';
let player = null;

function post(m) { parent.postMessage({ pluginMessage: m }, '*'); }
function fmt(t, d) { return t.toFixed(2) + ' / ' + d.toFixed(2) + 's'; }
function countTracks(doc) {
  let layers = 0, tracks = 0;
  (function walk(ls){ (ls||[]).forEach(l => { layers++; tracks += (l.tracks||[]).length; walk(l.children); }); })(doc.layers);
  return { layers, tracks };
}
function showJson() {
  if (activeTab === 'health') {
    $('json').style.display = 'none'; $('health').style.display = 'block';
    renderHealth();
    return;
  }
  $('health').style.display = 'none'; $('json').style.display = 'block';
  const obj = activeTab === 'doc' ? current.doc : current.raw;
  $('json').textContent = obj ? JSON.stringify(obj, null, 2) : '{}';
}

// ---- Health check: scan the MotionDoc for layers that will look WRONG, so we can localize
// a "looks different from Figma" complaint without rendering. Pure analysis of the doc.
function dataUrlBytes(u) { if (!u || typeof u !== 'string') return 0; const i = u.indexOf(','); return i < 0 ? 0 : Math.floor((u.length - i - 1) * 0.75); }
function analyzeLayer(l, dur, out, path) {
  const b = l.base || {}, tracks = l.tracks || [], issues = [];
  const props = {}; tracks.forEach(t => { props[t.property] = (props[t.property] || 0) + 1; });
  // 1) degenerate rasterized texture (the scale-0 / 0-size export -> ~1x1 PNG bug)
  if (b.image) { const n = dataUrlBytes(b.image); if (n < 300) issues.push(['bad', 'texture exported ~tiny (' + n + 'B) — node was probably scaled-0 / 0-size at export; appears blank']); }
  // 2) zero / negative size (won't paint)
  const isPath = b.shape && b.shape.kind === 'path';
  if (!isPath && (!(b.width > 0) || !(b.height > 0))) issues.push(['warn', 'size ' + b.width + '×' + b.height + ' — nothing visible unless a width/height track grows it']);
  // 3) starts invisible and never animates opacity -> will NEVER show
  if ((b.opacity === 0) && !props.opacity) issues.push(['bad', 'opacity 0 at rest and no opacity track — this layer never becomes visible']);
  // 4) no paint at all
  const paints = b.fill || b.image || b.text || b.shape; if (!paints && l.type !== 'group') issues.push(['warn', 'no fill / image / shape / text — invisible']);
  // 5) vector path missing geometry
  if (isPath && !(b.shape.paths && b.shape.paths.length && b.shape.paths[0].d)) issues.push(['bad', 'vector shape but path data is empty']);
  // 6) keyframes beyond the timeline, or NaN values
  tracks.forEach(t => (t.keys || []).forEach(k => {
    if (k.t > dur + 0.001) issues.push(['warn', t.property + ' keyframe at t=' + k.t.toFixed(2) + 's is beyond duration ' + dur.toFixed(2) + 's']);
    const flat = Array.isArray(k.v) ? k.v : [k.v];
    if (flat.some(x => typeof x === 'number' && !isFinite(x))) issues.push(['bad', t.property + ' has a non-finite keyframe value']);
  }));
  if (issues.length) out.push({ id: l.id, name: l.name, path, type: l.type, issues, tracks: Object.keys(props).join(', ') || '—' });
  (l.children || []).forEach((c, i) => analyzeLayer(c, dur, out, path + ' › ' + (c.name || i)));
}
function scanHealth() {
  if (!current.doc) return [];
  const dur = current.doc.duration || 1, out = [];
  (current.doc.layers || []).forEach((l, i) => analyzeLayer(l, dur, out, l.name || ('#' + i)));
  return out;
}
function renderHealth() {
  const el = $('health');
  if (!current.doc) { el.innerHTML = '<div class="hl">No selection.</div>'; return; }
  const doc = current.doc, dur = doc.duration || 1, out = scanHealth();
  const c = countTracks(doc);
  let html = '<div class="hl ' + (out.length ? 'warnc' : 'ok') + '">'
    + '<span class="hname">' + (out.length ? out.length + ' layer(s) look suspect' : 'No structural issues found') + '</span>'
    + '<span class="hid"> · ' + c.layers + ' layers · ' + c.tracks + ' tracks · ' + dur.toFixed(2) + 's · stage ' + doc.stage.width + '×' + doc.stage.height + '</span>'
    + (current._notice ? '<span class="iss w">⚠ ' + current._notice + '</span>' : '') + '</div>';
  out.forEach(o => {
    html += '<div class="hl ' + (o.issues.some(i => i[0] === 'bad') ? 'bad' : 'warnc') + '">'
      + '<span class="hname">' + (o.name || '(unnamed)') + '</span> <span class="hid">' + o.type + ' · ' + o.id + ' · tracks: ' + o.tracks + '</span>'
      + o.issues.map(i => '<span class="iss ' + (i[0] === 'warn' ? 'w' : '') + '">' + (i[0] === 'bad' ? '✗ ' : '⚠ ') + i[1] + '</span>').join('') + '</div>';
  });
  el.innerHTML = html;
}

function fitStage() {
  if (!current.doc) return;
  const area = $('stageArea');
  const sw = current.doc.stage.width || 1, sh = current.doc.stage.height || 1;
  const scale = Math.max(Math.min((area.clientWidth - 36) / sw, (area.clientHeight - 36) / sh, 1), 0.01);
  $('host').style.transform = 'scale(' + scale + ')';
  $('hostBox').style.width = (sw * scale) + 'px';
  $('hostBox').style.height = (sh * scale) + 'px';
  $('fit').textContent = Math.round(scale * 100) + '%';
}
window.addEventListener('resize', fitStage);
if (window.ResizeObserver) new ResizeObserver(() => fitStage()).observe(document.getElementById('stageArea'));

function mount(doc) {
  $('empty').style.display = 'none';
  $('hostBox').style.display = 'block';
  if (player) player.pause();
  const dur = doc.duration || 1;
  try {
    player = BlinnMotion.create($('host'), doc, {
      loop: $('loop').checked,
      rate: parseFloat($('speed').value),
      onframe: (t, f) => { $('scrub').value = Math.round(f * 1000); $('time').textContent = fmt(t, dur); if (document.activeElement !== $('dbgTime')) $('dbgTime').value = t.toFixed(2); }
    });
  } catch (err) {
    player = null;
    $('warn').textContent = '⚠ render error: ' + (err && err.message ? err.message : err);
    return;
  }
  requestAnimationFrame(fitStage);
  $('time').textContent = fmt(0, player.duration);
  if (doc.duration > 0 && countTracks(doc).tracks > 0) { player.play(); $('play').textContent = '❚❚'; }
  else { $('play').textContent = '▶'; }
}

window.onmessage = (e) => {
  const m = e.data.pluginMessage; if (!m) return;
  if (m.type === 'export') {
    current.doc = m.doc; current.raw = m.raw; current._notice = m.notice || '';
    $('title').textContent = m.doc.meta.name || 'Selection';
    $('dur').textContent = '· ' + m.doc.duration.toFixed(2) + 's · ' + m.doc.stage.width + '×' + m.doc.stage.height;
    const base = m.notice ? '⚠ ' + m.notice : (m.hasMotion ? '' : '⚠ no Motion keyframes on this selection');
    const suspect = scanHealth(), bad = suspect.filter(s => s.issues.some(i => i[0] === 'bad')).length;
    const hint = suspect.length ? (base ? '  ·  ' : '') + '🔍 ' + suspect.length + ' layer(s) suspect' + (bad ? ' (' + bad + ' blank)' : '') + ' — see Health' : '';
    $('warn').textContent = base + hint;
    const c = countTracks(m.doc); $('stat').textContent = 'Layers: ' + c.layers + ' · Tracks: ' + c.tracks;
    showJson();
    mount(m.doc);
  } else if (m.type === 'empty') {
    current = { doc: null, raw: null };
    $('title').textContent = '—'; $('dur').textContent = ''; $('warn').textContent = '';
    $('emptyMsg').textContent = m.reason;
    $('empty').style.display = 'block';
    $('hostBox').style.display = 'none';
    $('hostBox').style.width = ''; $('hostBox').style.height = '';
    if (player) { player.pause(); player = null; }
    $('time').textContent = '0.00 / 0.00s'; $('scrub').value = 0; $('play').textContent = '▶'; $('fit').textContent = '100%';
    $('stat').textContent = 'Layers: 0 · Tracks: 0';
    showJson();
  } else if (m.type === 'error') {
    $('warn').textContent = '⚠ ' + m.message;
  }
};

$('play').onclick = () => { if (!player) return; player.toggle(); $('play').textContent = player._playing ? '❚❚' : '▶'; };
$('restart').onclick = () => { if (!player) return; player.stop(); player.play(); $('play').textContent = '❚❚'; };
$('scrub').oninput = () => { if (!player) return; player.pause(); $('play').textContent = '▶'; player.seekFraction($('scrub').value / 1000); };
$('loop').onchange = () => { if (player) player.loop = $('loop').checked; };
$('speed').onchange = () => { if (player) player.setRate(parseFloat($('speed').value)); };
$('reexport').onclick = () => post({ type: 'reexport' });
$('demo').onclick = () => post({ type: 'createDemo' });
$('demoEmpty').onclick = () => post({ type: 'createDemo' });

// ---- debug / compare tools ----
$('dbgToggle').onclick = () => {
  const bar = $('dbgBar'); const show = bar.style.display === 'none';
  bar.style.display = show ? 'flex' : 'none';
  $('dbgToggle').style.color = show ? 'var(--acc)' : '';
};
$('dbgOutline').onchange = () => $('host').classList.toggle('outline', $('dbgOutline').checked);
$('dbgTime').oninput = () => {
  if (!player) return; player.pause(); $('play').textContent = '▶';
  const t = Math.max(0, Math.min(parseFloat($('dbgTime').value) || 0, player.duration));
  player.seek(t); $('scrub').value = Math.round((t / player.duration) * 1000);
};
$('dbgRef').onchange = () => {
  const f = $('dbgRef').files && $('dbgRef').files[0]; if (!f) return;
  const img = $('refImg'); img.src = URL.createObjectURL(f);
  img.style.display = 'block'; img.style.opacity = $('dbgRefOp').value / 100;
};
$('dbgRefOp').oninput = () => { $('refImg').style.opacity = $('dbgRefOp').value / 100; };
$('dbgRefClear').onclick = () => { const img = $('refImg'); img.style.display = 'none'; img.removeAttribute('src'); $('dbgRef').value = ''; };

document.querySelectorAll('.tab').forEach(tab => tab.onclick = () => {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  tab.classList.add('on'); activeTab = tab.dataset.tab; showJson();
});

$('copy').onclick = () => {
  const txt = $('json').textContent;
  navigator.clipboard && navigator.clipboard.writeText(txt);
  post({ type: 'notify', message: 'Copied ' + activeTab + ' JSON' });
};
$('download').onclick = () => {
  const obj = activeTab === 'doc' ? current.doc : current.raw; if (!obj) return;
  const name = ((current.doc && current.doc.meta.name) || 'motion').replace(/[^\w.-]+/g, '_');
  const blob = new Blob([JSON.stringify(obj, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name + '.' + activeTab + '.json';
  document.body.appendChild(a); a.click(); a.remove();
};

post({ type: 'ready' });
</script>
</body>
</html>
